# Rebuild the committed dmm-tools renderer binary and open a PR with the result.
name: 'Rebuild dmm-tools-para'
on:
  workflow_dispatch:

jobs:
  rebuild_binary:
    name: 'Rebuild Renderer Binary'
    runs-on: ubuntu-22.04
    env:
      BASE_BRANCH: ${{ github.ref_name }}
    steps:
      - id: create_token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.PRIVATE_KEY }}

      - run: echo "GH_TOKEN=${{ steps.create_token.outputs.token }}" >> "$GITHUB_ENV"

      - name: 'Checkout'
        uses: actions/checkout@v6
        with:
          token: ${{ steps.create_token.outputs.token }}

      - name: 'Prepare Branch'
        run: |
          git checkout -B "$BASE_BRANCH" "origin/$BASE_BRANCH"

      - name: 'Install Rust'
        uses: dtolnay/rust-toolchain@stable

      - name: 'Install musl tools'
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: 'Rebuild binary'
        run: |
          rustup target add x86_64-unknown-linux-musl
          tmp_dir="$(mktemp -d)"
          trap 'rm -rf "$tmp_dir"' EXIT
          git clone https://github.com/AffectedArc07/ParaSpacemanDMM "$tmp_dir/ParaSpacemanDMM"
          cd "$tmp_dir/ParaSpacemanDMM"
          cargo build --release --locked --target x86_64-unknown-linux-musl
          binary_path="$(find target/x86_64-unknown-linux-musl/release -maxdepth 1 -type f \( -name 'dmm-tools-para' -o -name 'dmm-tools' -o -name 'dmm_tools' \) | head -n 1)"
          if [ -z "$binary_path" ]; then
            binary_path="$(find target/x86_64-unknown-linux-musl/release -maxdepth 1 -type f -executable ! -name '*.rlib' ! -name '*.d' ! -name '*.o' ! -name '*.so' ! -name '*.a' | head -n 1)"
          fi
          if [ -z "$binary_path" ]; then
            echo "Could not find built dmm-tools executable" >&2
            find target/x86_64-unknown-linux-musl/release -maxdepth 1 -type f -printf '%f\n'
            exit 1
          fi
          install -m 0755 "$binary_path" "$GITHUB_WORKSPACE/tools/github-actions/dmm-tools-para"

      - name: 'Commit binary'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "dmm-tools Rebuild"
          git add tools/github-actions/dmm-tools-para
          git commit -m "Rebuild dmm-tools-para (`date`)" || true
          git push origin "HEAD:$BASE_BRANCH"
