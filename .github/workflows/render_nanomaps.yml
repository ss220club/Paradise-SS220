# GitHub action to autorender nanomaps outside the game
# This kills off the awful verb we have that takes a full 50 seconds and hangs the whole server
# The file names and locations are VERY important here
# DO NOT EDIT THIS UNLESS YOU KNOW WHAT YOU ARE DOING
# -aa
name: 'Render Nanomaps'
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  generate_maps:
    name: 'Generate NanoMaps'
    runs-on: ubuntu-22.04
    steps:
      - id: create_token
        uses: actions/create-github-app-token@v3.1.1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.PRIVATE_KEY }}

      - run: echo "GH_TOKEN=${{ steps.create_token.outputs.token }}" >> "$GITHUB_ENV"

      - name: 'Update Branch'
        uses: actions/checkout@v6
        with:
          token: ${{ steps.create_token.outputs.token }}
          ref: ${{ env.RENDER_BRANCH }}

      - name: 'Install Python dependencies'
        run: python3 -m pip install avulto==0.1.22

      - name: 'Generate Maps'
        run: './tools/github-actions/nanomap-renderer-invoker.sh'

      - name: 'Commit Maps and open PR'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "NanoMap Generation"

          git checkout -B nanomap-render
          git add icons/_nanomaps/

          if git diff-index --quiet HEAD -- icons/_nanomaps/; then
            echo "No NanoMaps update required, skipping."
            exit 0
          fi

          git commit -m "NanoMap Auto-Update (`date`)"
          git push -f origin nanomap-render

          result=$(gh pr create \
            -t "Automatic NanoMap Update" \
            -b "This pull request updates the server NanoMaps. Please review the diff images before merging." \
            -l "NanoMaps,:scroll: CL не требуется" \
            -H "nanomap-render" \
            -B "$GITHUB_REF_NAME" 2>&1) || true
          echo "$result"
