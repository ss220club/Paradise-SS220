# GitHub action to autorender nanomaps outside the game
# This kills off the awful verb we have that takes a full 50 seconds and hangs the whole server
# The file names and locations are VERY important here
# DO NOT EDIT THIS UNLESS YOU KNOW WHAT YOU ARE DOING
# -aa
name: 'Render Nanomaps New Test'
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  generate_maps:
    name: 'Generate NanoMaps'
    runs-on: ubuntu-22.04
    env:
      BASE_BRANCH: ${{ github.ref_name }}
    steps:
      - id: create_token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.PRIVATE_KEY }}

      - run: echo "GH_TOKEN=${{ steps.create_token.outputs.token }}" >> "$GITHUB_ENV"

      - name: 'Update Branch'
        uses: actions/checkout@v6
        with:
          token: ${{ steps.create_token.outputs.token }}

      - name: Branch
        run: |
          RENDER_BRANCH="nanomap-render-${BASE_BRANCH//\//-}"
          echo "RENDER_BRANCH=$RENDER_BRANCH" >> "$GITHUB_ENV"
          git checkout -B "$RENDER_BRANCH" "origin/$BASE_BRANCH"

      - name: 'Install Dependencies'
        run: |
          pip install -r tools/requirements.txt

      - name: 'Generate Maps'
        run: 'bash ./tools/github-actions/nanomap-renderer-invoker_new_test.sh'

      - name: 'Commit Maps and open PR'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "NanoMap Generation"
          git pull origin "$BASE_BRANCH"
          git commit -m "NanoMap Auto-Update (`date`)" -a || true
          git push -f -u origin "$RENDER_BRANCH"
          result=$(gh pr create -t "Automatic NanoMap Update" -b "This pull request updates the server NanoMaps. Please review the diff images before merging." -l "NanoMaps,:scroll: CL РЅРµ С‚СЂРµР±СѓРµС‚СЃСЏ" -H "$RENDER_BRANCH" -B "$BASE_BRANCH" 2>&1) || true
          echo "$result"
          if echo "$result" | grep -q "No commits between $BASE_BRANCH and $RENDER_BRANCH"; then
            echo "No NanoMaps update required, skipping."
          fi
