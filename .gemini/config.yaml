have_fun: true
code_review:
  disable: false
  comment_severity_threshold: MEDIUM
  max_review_comments: 20
  pull_request_opened:
    help: false
    summary: true
    code_review: true
    include_drafts: false
ignore_patterns:
  - "**/*.dmi"
  - "**/*.ogg"
  - "rustlibs.dll"
  - "tgui/public/**/*.bundle.*"
  - "tgui/.yarn/rspack/**"
