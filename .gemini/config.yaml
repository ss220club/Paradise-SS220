have_fun: true
code_review:
  disable: false
  comment_severity_threshold: MEDIUM
  max_review_comments: 20
  pull_request_opened:
    help: false
    summary: true
    code_review: true
    include_drafts: false
ignore_patterns:
  - "modular_ss220/generated/**"
  - "modular_ss220/example/generated/**"
  - "**/*.dmi"
  - "**/*.ogg"
  - "**/*.dmm"
  - "rustlibs.dll"
  - "tgui/public/**/*.bundle.*"
  - "tgui/public/.tmp/**"
  - "tgui/.yarn/rspack/**"
